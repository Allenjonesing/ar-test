<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>GPS Raw Data Monitor</title>
  <link rel="icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: #0a0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff; display: flex; flex-direction: column; }

    #header {
      flex-shrink: 0; padding: 10px 16px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(0,0,0,0.6);
    }
    #header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; color: #00ff88; }
    #back-link { font-size: 0.78rem; color: rgba(255,255,255,0.35); text-decoration: none; }
    #back-link:hover { color: #00ff88; }

    #scroll-area {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* Signal quality bar */
    #signal-section {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(0,255,136,0.18);
      border-radius: 14px; padding: 14px;
    }
    #signal-section h3 { margin: 0 0 10px; font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: rgba(255,255,255,0.4); }
    #signal-bar-track {
      height: 12px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden;
    }
    #signal-bar-fill {
      height: 100%; width: 0%; border-radius: 6px;
      background: linear-gradient(to right, #ff5555, #ffcc00, #00ff88);
      transition: width 0.5s ease;
    }
    #signal-label { font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-top: 6px; }

    /* Main data grid */
    .data-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .data-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(0,255,136,0.15);
      border-radius: 12px; padding: 12px 14px;
    }
    .data-label {
      font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.38); margin-bottom: 4px;
    }
    .data-value {
      font-size: 1.15rem; font-weight: 800; color: #00ff88;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 8px rgba(0,255,136,0.35);
      word-break: break-all;
    }
    .data-value.small { font-size: 0.9rem; }
    .data-sub { font-size: 0.68rem; color: rgba(255,255,255,0.3); margin-top: 2px; }

    /* Fix history log */
    #fix-log-section {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,136,0.12);
      border-radius: 14px; padding: 14px; flex: 1; min-height: 140px;
    }
    #fix-log-section h3 { margin: 0 0 8px; font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: rgba(255,255,255,0.35); }
    #fix-log {
      max-height: 160px; overflow-y: auto;
      font-size: 0.65rem; font-family: 'SF Mono', 'Fira Code', monospace;
      color: rgba(0,255,136,0.75); line-height: 1.7;
    }
    #fix-log .log-row { border-bottom: 1px solid rgba(255,255,255,0.04); padding: 2px 0; }
    #fix-log .log-row:last-child { border-bottom: none; }

    /* Controls */
    #controls {
      flex-shrink: 0; padding: 12px; display: flex; gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    button {
      flex: 1; padding: 11px 16px; border: 2px solid #00ff88; border-radius: 24px;
      background: rgba(0,0,0,0.55); color: #00ff88; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; backdrop-filter: blur(6px);
      transition: background 0.2s, transform 0.15s;
    }
    button:hover  { background: rgba(0,255,136,0.12); transform: scale(1.03); }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    #clear-log-btn {
      flex: 0 0 auto; border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4);
      padding: 11px 16px;
    }
    #clear-log-btn:hover { background: rgba(255,255,255,0.06); }
  </style>
</head>
<body>

<div id="header">
  <h1>📡 GPS Raw Monitor</h1>
  <a id="back-link" href="index.html">← Home</a>
</div>

<div id="scroll-area">

  <!-- Signal quality -->
  <div id="signal-section">
    <h3>Signal Quality</h3>
    <div id="signal-bar-track"><div id="signal-bar-fill"></div></div>
    <div id="signal-label">Waiting for GPS…</div>
  </div>

  <!-- Main data grid -->
  <div class="data-grid">
    <div class="data-card">
      <div class="data-label">Latitude</div>
      <div class="data-value small" id="val-lat">—</div>
      <div class="data-sub">decimal degrees</div>
    </div>
    <div class="data-card">
      <div class="data-label">Longitude</div>
      <div class="data-value small" id="val-lng">—</div>
      <div class="data-sub">decimal degrees</div>
    </div>
    <div class="data-card">
      <div class="data-label">Accuracy</div>
      <div class="data-value" id="val-accuracy">—</div>
      <div class="data-sub">metres (±)</div>
    </div>
    <div class="data-card">
      <div class="data-label">Altitude</div>
      <div class="data-value" id="val-altitude">—</div>
      <div class="data-sub">metres (MSL)</div>
    </div>
    <div class="data-card">
      <div class="data-label">Alt. Accuracy</div>
      <div class="data-value" id="val-alt-acc">—</div>
      <div class="data-sub">metres (±)</div>
    </div>
    <div class="data-card">
      <div class="data-label">Speed</div>
      <div class="data-value" id="val-speed">—</div>
      <div class="data-sub">m/s</div>
    </div>
    <div class="data-card">
      <div class="data-label">Heading</div>
      <div class="data-value" id="val-heading">—</div>
      <div class="data-sub">GPS bearing °</div>
    </div>
    <div class="data-card">
      <div class="data-label">Fix Age</div>
      <div class="data-value" id="val-age">—</div>
      <div class="data-sub">seconds ago</div>
    </div>
  </div>

  <!-- Fix log -->
  <div id="fix-log-section">
    <h3>Fix History (last 50)</h3>
    <div id="fix-log"><em style="color:rgba(255,255,255,0.2)">No fixes yet…</em></div>
  </div>

</div>

<div id="controls">
  <button id="start-btn">▶ Start Monitoring</button>
  <button id="clear-log-btn" disabled>Clear Log</button>
</div>

<script>
'use strict';

let watchId = null;
let running = false;
let fixCount = 0;
let lastFixTime = null;
let ageInterval = null;
const MAX_LOG = 50;
const fixLog = [];

const valLat      = document.getElementById('val-lat');
const valLng      = document.getElementById('val-lng');
const valAccuracy = document.getElementById('val-accuracy');
const valAltitude = document.getElementById('val-altitude');
const valAltAcc   = document.getElementById('val-alt-acc');
const valSpeed    = document.getElementById('val-speed');
const valHeading  = document.getElementById('val-heading');
const valAge      = document.getElementById('val-age');
const signalFill  = document.getElementById('signal-bar-fill');
const signalLabel = document.getElementById('signal-label');
const fixLogEl    = document.getElementById('fix-log');
const startBtn    = document.getElementById('start-btn');
const clearLogBtn = document.getElementById('clear-log-btn');

/* ── Signal quality 0-100 from accuracy metres ───────────────────────────── */
function accuracyToQuality(acc) {
  // 5 m -> 100%, 100 m -> 0%
  return Math.max(0, Math.min(100, 100 - (acc - 5) * (100 / 95)));
}

function qualityLabel(q) {
  if (q >= 80) return 'Excellent signal';
  if (q >= 55) return 'Good signal';
  if (q >= 30) return 'Fair signal';
  return 'Poor signal – move outdoors';
}

function fmt(v, digits) {
  return v != null ? Number(v).toFixed(digits) : '—';
}

/* ── GPS callback ─────────────────────────────────────────────────────────── */
function onGPS(pos) {
  const c = pos.coords;
  lastFixTime = Date.now();
  fixCount++;

  valLat.textContent      = fmt(c.latitude, 6);
  valLng.textContent      = fmt(c.longitude, 6);
  valAccuracy.textContent = c.accuracy != null ? Math.round(c.accuracy) + ' m' : '—';
  valAltitude.textContent = c.altitude  != null ? Math.round(c.altitude) + ' m' : '—';
  valAltAcc.textContent   = c.altitudeAccuracy != null ? Math.round(c.altitudeAccuracy) + ' m' : '—';
  valSpeed.textContent    = c.speed    != null ? c.speed.toFixed(2) + ' m/s' : '—';
  valHeading.textContent  = c.heading  != null ? Math.round(c.heading) + '°' : '—';
  valAge.textContent      = '0 s';

  const q = accuracyToQuality(c.accuracy || 999);
  signalFill.style.width = q + '%';
  signalLabel.textContent = `Fix #${fixCount} · ±${Math.round(c.accuracy || 0)} m · ${qualityLabel(q)}`;

  /* Append to log */
  const t = new Date().toLocaleTimeString();
  const entry = `${t}  lat=${fmt(c.latitude,5)} lng=${fmt(c.longitude,5)} acc=±${Math.round(c.accuracy||0)}m alt=${c.altitude!=null?Math.round(c.altitude)+'m':'—'} spd=${c.speed!=null?c.speed.toFixed(1):'—'}m/s`;
  fixLog.unshift(entry);
  if (fixLog.length > MAX_LOG) fixLog.pop();
  renderLog();
}

function onGPSError(err) {
  signalLabel.textContent = 'GPS error: ' + err.message;
  signalFill.style.width = '0%';
}

function renderLog() {
  fixLogEl.innerHTML = fixLog.map(e => `<div class="log-row">${escHtml(e)}</div>`).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Age ticker ──────────────────────────────────────────────────────────── */
function startAgeTicker() {
  ageInterval = setInterval(() => {
    if (lastFixTime) {
      valAge.textContent = Math.round((Date.now() - lastFixTime) / 1000) + ' s';
    }
  }, 1000);
}

/* ── Controls ────────────────────────────────────────────────────────────── */
startBtn.addEventListener('click', () => {
  if (!running) {
    if (!navigator.geolocation) {
      signalLabel.textContent = 'Geolocation not supported on this device/browser.';
      return;
    }
    running = true;
    startBtn.textContent = '⏹ Stop Monitoring';
    clearLogBtn.disabled = false;
    watchId = navigator.geolocation.watchPosition(onGPS, onGPSError, {
      enableHighAccuracy: true, maximumAge: 0
    });
    startAgeTicker();
  } else {
    running = false;
    startBtn.textContent = '▶ Start Monitoring';
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (ageInterval) { clearInterval(ageInterval); ageInterval = null; }
    signalLabel.textContent = `Stopped. ${fixCount} fixes recorded.`;
  }
});

clearLogBtn.addEventListener('click', () => {
  fixLog.length = 0;
  fixCount = 0;
  renderLog();
  fixLogEl.innerHTML = '<em style="color:rgba(255,255,255,0.2)">Log cleared.</em>';
});
</script>
</body>
</html>
