<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Live Map Trail — Leaflet</title>
  <link rel="icon" href="favicon.ico">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: #0a0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }

    #map { position: fixed; inset: 0; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 10px 16px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: none;
    }
    #header h1 {
      margin: 0; font-size: 1.1rem; font-weight: 700; color: #00ff88;
      text-shadow: 0 0 12px rgba(0,255,136,0.4);
    }
    #back-link {
      font-size: 0.78rem; color: rgba(255,255,255,0.6); text-decoration: none;
      pointer-events: all;
    }
    #back-link:hover { color: #00ff88; }

    #status-bar {
      position: fixed; top: 44px; left: 0; right: 0; z-index: 1000;
      padding: 6px 14px;
      display: flex; justify-content: space-between; gap: 8px;
      pointer-events: none;
    }
    .status-pill {
      font-size: 0.78rem; color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #hud {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; pointer-events: none; z-index: 1000;
    }
    .hud-block {
      background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 10px 18px; text-align: center; min-width: 80px;
    }
    .hud-label {
      display: block; font-size: 0.6rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 4px;
    }
    .hud-value {
      display: block; font-size: 1.1rem; font-weight: 700; color: #00ff88;
    }

    #controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 1000;
    }
    button {
      padding: 12px 24px; border: none; border-radius: 24px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
    }
    #start-btn { background: #00ff88; color: #000; }
    #start-btn:hover { background: #00cc6f; }
    #start-btn:disabled { background: #555; color: #999; cursor: not-allowed; }
    #locate-btn {
      background: rgba(0,180,255,0.15); color: #00ccff;
      border: 1px solid rgba(0,180,255,0.3);
    }
    #locate-btn:hover { background: rgba(0,180,255,0.25); }
    #export-btn {
      background: rgba(255,200,0,0.12); color: #ffcc00;
      border: 1px solid rgba(255,200,0,0.3);
    }
    #export-btn:hover { background: rgba(255,200,0,0.22); }
    #clear-btn {
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.15);
    }
    #clear-btn:hover { background: rgba(255,80,80,0.15); color: #ff6b6b; border-color: #ff6b6b; }

    .leaflet-tile-pane { filter: saturate(0.6) brightness(0.55); }

    /* custom leaflet dot markers */
    .trail-dot-icon { border-radius: 50%; }
    .pos-arrow { width: 32px; height: 32px; }

    #info-toast {
      position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px;
      border-radius: 10px; font-size: 0.85rem; z-index: 2000;
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="header">
  <h1>🗺️ Live Map Trail</h1>
  <a id="back-link" href="index.html">← Home</a>
</div>

<div id="status-bar">
  <span class="status-pill" id="status-text">Awaiting GPS…</span>
  <span class="status-pill" id="acc-text">Acc: —</span>
</div>

<div id="hud">
  <div class="hud-block">
    <span class="hud-label">Distance</span>
    <span class="hud-value" id="hud-dist">0 m</span>
  </div>
  <div class="hud-block">
    <span class="hud-label">Points</span>
    <span class="hud-value" id="hud-pts">0</span>
  </div>
  <div class="hud-block">
    <span class="hud-label">Speed</span>
    <span class="hud-value" id="hud-speed">— km/h</span>
  </div>
</div>

<div id="controls">
  <button id="start-btn" disabled>Start Tracking</button>
  <button id="locate-btn">📍 Centre</button>
  <button id="export-btn">⬇ GeoJSON</button>
  <button id="clear-btn">✕ Clear</button>
</div>

<div id="info-toast"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLEg=" crossorigin=""></script>
<script>
'use strict';

/* ── Map init ──────────────────────────────────────────────────────────── */
const map = L.map('map', {
  center: [51.505, -0.09],
  zoom: 17,
  zoomControl: false,
  attributionControl: false,
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 21,
}).addTo(map);
L.control.attribution({ prefix: false }).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

/* ── State ─────────────────────────────────────────────────────────────── */
const STATE = {
  tracking: false,
  watchId: null,
  path: [],       // L.LatLng[]
  rawPath: [],    // [{lat, lng, ts, acc, speed}]
  totalDistM: 0,
  centered: true,
};

/* load saved path */
(function loadSaved() {
  try {
    const saved = JSON.parse(localStorage.getItem('live-map-path') || '[]');
    if (saved.length > 0) {
      STATE.rawPath = saved;
      STATE.path = saved.map(p => L.latLng(p.lat, p.lng));
      recalcDist();
      rebuildPolyline();
      map.setView(STATE.path[STATE.path.length - 1], 17);
      updateHUD();
      toast(`Loaded ${saved.length} saved points`);
    }
  } catch (e) { /* ignore */ }
}());

/* ── Map layers ────────────────────────────────────────────────────────── */
let polyline = L.polyline([], {
  color: '#00ff88', weight: 4, opacity: 0.85,
}).addTo(map);

let posMarker = null;
let startMarker = null;
const dotMarkers = [];

function makePosIcon() {
  return L.divIcon({
    className: '',
    html: `<svg class="pos-arrow" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="14" fill="rgba(0,255,136,0.2)" stroke="#00ff88" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="6" fill="#00ff88"/>
    </svg>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
  });
}

function makeDotIcon(hue) {
  return L.divIcon({
    className: '',
    html: `<div style="width:8px;height:8px;border-radius:50%;background:hsl(${hue},90%,60%);box-shadow:0 0 4px hsl(${hue},90%,60%)"></div>`,
    iconSize: [8, 8],
    iconAnchor: [4, 4],
  });
}

function makeStartIcon() {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:#ffcc00;border:2px solid #000;box-shadow:0 0 8px rgba(255,200,0,0.8)"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

function rebuildPolyline() {
  polyline.setLatLngs(STATE.path);
}

/* ── Coordinate helpers ────────────────────────────────────────────────── */
function haversineM(lat1, lng1, lat2, lng2) {
  const R = 6371000, dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function recalcDist() {
  let d = 0;
  for (let i = 1; i < STATE.path.length; i++) {
    d += STATE.path[i-1].distanceTo(STATE.path[i]);
  }
  STATE.totalDistM = d;
}

/* ── GPS ───────────────────────────────────────────────────────────────── */
const MIN_MOVE_M = 2;

function onGPSSuccess(pos) {
  const { latitude: lat, longitude: lng, accuracy: acc, speed } = pos.coords;
  const latlng = L.latLng(lat, lng);

  document.getElementById('acc-text').textContent = `Acc: ±${Math.round(acc)}m`;

  /* First fix — enable start button & centre map */
  if (STATE.path.length === 0 && !STATE.tracking) {
    document.getElementById('start-btn').disabled = false;
    document.getElementById('status-text').textContent = 'GPS ready — tap Start';
    map.setView(latlng, 17);
  }

  /* Update current position marker always */
  if (!posMarker) {
    posMarker = L.marker(latlng, { icon: makePosIcon() }).addTo(map);
  } else {
    posMarker.setLatLng(latlng);
  }

  if (!STATE.tracking) return;

  /* Filter near-duplicates */
  if (STATE.path.length > 0) {
    const last = STATE.path[STATE.path.length - 1];
    if (last.distanceTo(latlng) < MIN_MOVE_M) return;
  }

  STATE.path.push(latlng);
  STATE.rawPath.push({ lat, lng, ts: Date.now(), acc, speed: speed || 0 });
  polyline.addLatLng(latlng);

  /* Dot marker with hue based on position in trail */
  const t = STATE.path.length / 300;
  const hue = Math.round(140 + t * 110);
  const dot = L.marker(latlng, { icon: makeDotIcon(hue) }).addTo(map);
  dotMarkers.push(dot);

  /* Start marker on first tracking point */
  if (STATE.path.length === 1) {
    startMarker = L.marker(latlng, { icon: makeStartIcon() })
      .bindTooltip('Start', { permanent: false, direction: 'top' })
      .addTo(map);
  }

  recalcDist();
  saveToStorage();
  updateHUD(speed);

  if (STATE.centered) map.setView(latlng);

  document.getElementById('status-text').textContent = 'Tracking…';
}

function onGPSError(err) {
  document.getElementById('status-text').textContent = `GPS error: ${err.message}`;
}

function startGPS() {
  if (STATE.watchId !== null) return;
  STATE.watchId = navigator.geolocation.watchPosition(onGPSSuccess, onGPSError, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 15000,
  });
}

/* ── Controls ──────────────────────────────────────────────────────────── */
document.getElementById('start-btn').addEventListener('click', () => {
  if (!STATE.tracking) {
    STATE.tracking = true;
    STATE.centered = true;
    document.getElementById('start-btn').textContent = 'Stop Tracking';
    document.getElementById('start-btn').style.background = '#ff6b6b';
    document.getElementById('start-btn').style.color = '#fff';
    document.getElementById('status-text').textContent = 'Tracking…';
  } else {
    STATE.tracking = false;
    document.getElementById('start-btn').textContent = 'Resume Tracking';
    document.getElementById('start-btn').style.background = '#00ff88';
    document.getElementById('start-btn').style.color = '#000';
    document.getElementById('status-text').textContent = 'Paused';
  }
});

document.getElementById('locate-btn').addEventListener('click', () => {
  STATE.centered = true;
  if (STATE.path.length > 0) {
    map.setView(STATE.path[STATE.path.length - 1], 17);
  } else if (posMarker) {
    map.setView(posMarker.getLatLng(), 17);
  }
});

/* Stop auto-centering when user pans */
map.on('dragstart', () => { STATE.centered = false; });

document.getElementById('export-btn').addEventListener('click', exportGeoJSON);

document.getElementById('clear-btn').addEventListener('click', () => {
  if (!confirm('Clear trail?')) return;
  STATE.path = [];
  STATE.rawPath = [];
  STATE.totalDistM = 0;
  STATE.tracking = false;
  polyline.setLatLngs([]);
  dotMarkers.forEach(m => map.removeLayer(m));
  dotMarkers.length = 0;
  if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
  document.getElementById('start-btn').textContent = 'Start Tracking';
  document.getElementById('start-btn').style.background = '#00ff88';
  document.getElementById('start-btn').style.color = '#000';
  document.getElementById('start-btn').disabled = true;
  document.getElementById('status-text').textContent = 'Cleared';
  localStorage.removeItem('live-map-path');
  updateHUD();
});

/* ── Helpers ───────────────────────────────────────────────────────────── */
function updateHUD(speed) {
  const d = STATE.totalDistM;
  document.getElementById('hud-dist').textContent =
    d >= 1000 ? (d/1000).toFixed(2) + ' km' : Math.round(d) + ' m';
  document.getElementById('hud-pts').textContent = STATE.path.length;
  if (speed != null && speed > 0) {
    document.getElementById('hud-speed').textContent = (speed * 3.6).toFixed(1) + ' km/h';
  }
}

function saveToStorage() {
  try {
    localStorage.setItem('live-map-path', JSON.stringify(STATE.rawPath.slice(-2000)));
  } catch (e) { /* quota */ }
}

function exportGeoJSON() {
  if (STATE.rawPath.length === 0) { toast('No path to export'); return; }
  const geojson = {
    type: 'FeatureCollection',
    features: [{
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: STATE.rawPath.map(p => [p.lng, p.lat]),
      },
      properties: {
        totalDistanceM: Math.round(STATE.totalDistM),
        points: STATE.rawPath.length,
        startTime: new Date(STATE.rawPath[0].ts).toISOString(),
      },
    }],
  };
  const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'live-map-trail.geojson'; a.click();
  URL.revokeObjectURL(url);
  toast('Exported!');
}

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('info-toast');
  el.textContent = msg;
  el.style.opacity = '1';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

/* ── Boot ──────────────────────────────────────────────────────────────── */
if (!navigator.geolocation) {
  document.getElementById('status-text').textContent = 'Geolocation not supported';
} else {
  startGPS();
}
</script>
</body>
</html>
