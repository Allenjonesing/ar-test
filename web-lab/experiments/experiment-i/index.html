<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sidewalk Coin Dash — GPS Walk Game | AR Lab</title>
  <link rel="icon" href="../../../favicon.ico">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#050810;--coin:#ffd54a;--cyan:#00ccff;--text:rgba(255,255,255,.88);--dim:rgba(255,255,255,.38)}
    html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
    #app{display:flex;flex-direction:column;width:100%;height:100%}
    #top{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(0,0,0,.82);border-bottom:1px solid rgba(255,213,74,.26)}
    #back{color:var(--coin);text-decoration:none;font-size:.78rem} #back:hover{text-decoration:underline}
    #title{font-size:.86rem;font-weight:700;flex:1;text-align:center}
    .badge{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:10px;font-weight:700;background:rgba(255,213,74,.14);color:var(--coin);border:1px solid rgba(255,213,74,.3)}
    #map-wrap{position:relative;flex:1;min-height:0;overflow:hidden} #map{display:block;width:100%;height:100%}
    #hud{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:5px;z-index:20;pointer-events:none}
    .chip{background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 10px;font-size:.7rem}.chip strong{font-size:.95rem;color:var(--coin)}
    #compass{position:absolute;bottom:14px;right:14px;width:110px;height:110px;background:rgba(0,0,0,.82);border:2px solid rgba(255,213,74,.32);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;pointer-events:none}
    #arrow{position:absolute;top:50%;left:50%;width:0;height:0}#arrow::after{content:'';position:absolute;top:-32px;left:-5px;width:10px;height:34px;background:linear-gradient(to top,transparent 0%,var(--coin) 100%);border-radius:5px 5px 0 0;opacity:.9}
    #c-dist{font-size:.72rem;font-weight:700;color:var(--coin)} #c-lbl{font-size:.55rem;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
    #toast{position:absolute;bottom:14px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(0,0,0,.88);border:1px solid rgba(255,213,74,.4);border-radius:10px;padding:8px 16px;font-size:.8rem;color:var(--coin);transition:transform .3s;z-index:40;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0)}
    #controls{display:flex;gap:8px;padding:10px 12px;background:rgba(0,0,0,.9);border-top:1px solid rgba(255,255,255,.06)}
    .btn{flex:1;padding:12px 6px;border:none;border-radius:12px;font-size:.82rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}.btn:disabled{opacity:.3;pointer-events:none}.ghost{background:rgba(255,255,255,.07);color:var(--text);border:1px solid rgba(255,255,255,.12)}
    #intro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,8,16,.97);padding:28px;text-align:center;z-index:100}
    #intro h2{font-size:1.3rem;font-weight:800;margin-bottom:10px;color:var(--coin)} #intro p{font-size:.84rem;color:var(--dim);line-height:1.6;max-width:320px;margin-bottom:16px}
    #start{padding:14px 40px;border-radius:14px;border:none;background:var(--coin);color:#000;font-size:1rem;font-weight:800;cursor:pointer}
  </style>
</head>
<body>
<div id="app">
  <div id="top"><a id="back" href="../../../games.html">← Games</a><span id="title">🪙 Sidewalk Coin Dash</span><span class="badge">GPS · Coin Run</span></div>
  <div id="map-wrap">
    <canvas id="map"></canvas>
    <div id="hud"><div class="chip">🪙 Coins <strong id="score">0</strong></div><div class="chip">🔥 Chain <strong id="chain">0x</strong></div><div class="chip">📏 Walked <strong id="walked">0 m</strong></div><div class="chip">🧭 <strong id="hdg">---</strong></div></div>
    <div id="compass"><div id="arrow"></div><div style="font-size:1.5rem">🪙</div><div id="c-dist">---</div><div id="c-lbl">nearest coin</div></div>
    <div id="toast"></div>
    <div id="intro"><div style="font-size:3.2rem;margin-bottom:12px">🪙</div><h2>Sidewalk Coin Dash</h2><p>Collect coins placed on nearby walkable roads/paths. Stay moving to keep your chain multiplier alive.</p><button id="start">Start Dash</button></div>
  </div>
  <div id="controls"><button class="btn ghost" id="stop" disabled>⏹ Stop</button><button class="btn ghost" id="center" disabled>⌖ Centre</button><button class="btn ghost" id="reset">↺ Reset</button></div>
</div>
<script>
(function(){'use strict';
var COIN_RADIUS=6,COIN_COUNT=7,SPAWN_MIN=20,SPAWN_MAX=110,MAX_COINS=300,CHAIN_WINDOW_MS=20000;
var OVERPASS='https://overpass-api.de/api/interpreter',SNAP_R=220,SNAP_TTL=90000,SNAP_MOVE=110;
var RUN=false,WID=null,TICK=null,LAST=null,ORIGIN=null,DIST=0,SPEED=0,HEADING=null,SCORE=0,CHAIN=0,COINS=[],SEQ=0,SPAWNED=0,START=0,PATH=[];
var MAP={zoom:4,offset:{x:0,y:0},drag:false,last:null,auto:true};
var CACHE={nodes:[],lat:0,lng:0,ts:0,loading:false,pending:[]};
var cv=document.getElementById('map'),ctx=cv.getContext('2d'),toast=document.getElementById('toast');
var scoreEl=document.getElementById('score'),chainEl=document.getElementById('chain'),walkedEl=document.getElementById('walked');
var cDist=document.getElementById('c-dist'),arrow=document.getElementById('arrow');
var lastCollectAt=0;
function hav(a,b,c,d){var dl=(c-a)*Math.PI/180,dg=(d-b)*Math.PI/180,x=Math.sin(dl/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dg/2)**2;return 6371000*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function bear(a,b,c,d){var dg=(d-b)*Math.PI/180,y=Math.sin(dg)*Math.cos(c*Math.PI/180),x=Math.cos(a*Math.PI/180)*Math.sin(c*Math.PI/180)-Math.sin(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.cos(dg);return (Math.atan2(y,x)*180/Math.PI+360)%360;}
function gps2l(lat,lng){if(!ORIGIN)ORIGIN={lat:lat,lng:lng};return{x:(lng-ORIGIN.lng)*Math.cos(ORIGIN.lat*Math.PI/180)*111320,y:-(lat-ORIGIN.lat)*111111};}
function fmt(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60);s%=60;return m+':'+(s<10?'0':'')+s;}
function w2s(p){return{x:p.x*MAP.zoom+MAP.offset.x,y:p.y*MAP.zoom+MAP.offset.y};}
function say(m){toast.textContent=m;toast.classList.add('show');clearTimeout(say.t);say.t=setTimeout(function(){toast.classList.remove('show');},2400);}
function fetchNodes(lat,lng,cb){var now=Date.now();if(CACHE.nodes.length&&hav(lat,lng,CACHE.lat,CACHE.lng)<SNAP_MOVE&&now-CACHE.ts<SNAP_TTL){cb(CACHE.nodes);return;}if(CACHE.loading){CACHE.pending.push(cb);return;}CACHE.loading=true;CACHE.pending=[cb];var cos=Math.cos(lat*Math.PI/180),dLat=SNAP_R/111111,dLng=SNAP_R/(111320*cos);var bb=(lat-dLat).toFixed(6)+','+(lng-dLng).toFixed(6)+','+(lat+dLat).toFixed(6)+','+(lng+dLng).toFixed(6);
var q='[out:json][timeout:10];way[highway~"^(footway|path|pedestrian|sidewalk|cycleway|residential|living_street|service|tertiary|secondary|primary|unclassified|track)$"]('+bb+');node(w);out body;';
fetch(OVERPASS,{method:'POST',body:'data='+encodeURIComponent(q)}).then(function(r){return r.json();}).then(function(d){CACHE.loading=false;CACHE.ts=Date.now();CACHE.lat=lat;CACHE.lng=lng;CACHE.nodes=(d.elements||[]).filter(function(e){return e.type==='node';}).map(function(e){return{lat:e.lat,lng:e.lon};});var c=CACHE.pending;CACHE.pending=[];c.forEach(function(f){f(CACHE.nodes);});}).catch(function(){CACHE.loading=false;var c=CACHE.pending;CACHE.pending=[];c.forEach(function(f){f([]);});});}
function spawn(refLat,refLng,nodes){if(SPAWNED>=MAX_COINS)return;var lat,lng;var ok=(nodes||[]).filter(function(n){var d=hav(refLat,refLng,n.lat,n.lng);return d>=SPAWN_MIN&&d<=SPAWN_MAX;});if(ok.length){var p=ok[Math.floor(Math.random()*ok.length)];lat=p.lat;lng=p.lng;}else{var d=SPAWN_MIN+Math.random()*(SPAWN_MAX-SPAWN_MIN),a=Math.random()*Math.PI*2;lat=refLat+(d*Math.cos(a))/111111;lng=refLng+(d*Math.sin(a))/(111320*Math.cos(refLat*Math.PI/180));}
var l=gps2l(lat,lng);COINS.push({id:SEQ++,lat:lat,lng:lng,x:l.x,y:l.y,taken:false});SPAWNED++;}
function fill(){if(!LAST)return;var a=COINS.filter(function(c){return !c.taken;}).length;if(a>=COIN_COUNT)return;fetchNodes(LAST.lat,LAST.lng,function(nodes){var n=COINS.filter(function(c){return !c.taken;}).length;while(n<COIN_COUNT){spawn(LAST.lat,LAST.lng,nodes);n++;}draw();});}
function compass(){if(!LAST)return;var a=COINS.filter(function(c){return !c.taken;});if(!a.length){cDist.textContent='---';arrow.style.transform='rotate(0deg)';return;}var near=null,d=Infinity;a.forEach(function(c){var k=hav(LAST.lat,LAST.lng,c.lat,c.lng);if(k<d){d=k;near=c;}});if(!near)return;arrow.style.transform='rotate('+bear(LAST.lat,LAST.lng,near.lat,near.lng)+'deg)';cDist.textContent=d<1000?Math.round(d)+' m':(d/1000).toFixed(1)+' km';}
function collect(){if(!LAST)return;var got=0;COINS.forEach(function(c){if(c.taken)return;var d=hav(LAST.lat,LAST.lng,c.lat,c.lng);if(d<=COIN_RADIUS){c.taken=true;got++;}});if(!got)return;var now=Date.now();if(now-lastCollectAt<=CHAIN_WINDOW_MS){CHAIN+=got;}else{CHAIN=got;}lastCollectAt=now;SCORE+=got*Math.max(1,Math.min(5,CHAIN));scoreEl.textContent=SCORE;chainEl.textContent=Math.max(1,CHAIN)+'x';say('🪙 +' + got + ' coin' + (got>1?'s':'') + ' · chain ' + Math.max(1,CHAIN) + 'x');setTimeout(fill,600);}
function fit(){var pts=PATH.slice();COINS.filter(function(c){return !c.taken;}).forEach(function(c){pts.push({x:c.x,y:c.y});});if(!pts.length)return;var W=cv.width,H=cv.height,minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;pts.forEach(function(p){minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);});var pad=60,rX=maxX-minX||30,rY=maxY-minY||30;MAP.zoom=Math.max(1,Math.min(65,Math.min((W-pad*2)/rX,(H-pad*2)/rY)));MAP.offset.x=W/2-(minX+rX/2)*MAP.zoom;MAP.offset.y=H/2-(minY+rY/2)*MAP.zoom;}
function draw(){var W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);ctx.fillStyle='#050810';ctx.fillRect(0,0,W,H);if(!RUN&&!PATH.length)return;if(MAP.auto&&(PATH.length||COINS.length))fit();if(PATH.length>1){ctx.beginPath();var p0=w2s(PATH[0]);ctx.moveTo(p0.x,p0.y);for(var i=1;i<PATH.length;i++){var p=w2s(PATH[i]);ctx.lineTo(p.x,p.y);}ctx.strokeStyle='rgba(0,204,255,0.4)';ctx.lineWidth=2;ctx.stroke();}
COINS.forEach(function(c){if(c.taken)return;var p=w2s({x:c.x,y:c.y});ctx.save();ctx.shadowBlur=16;ctx.shadowColor='rgba(255,213,74,.75)';ctx.fillStyle='rgba(255,213,74,.14)';ctx.beginPath();ctx.arc(p.x,p.y,Math.max(8,COIN_RADIUS*MAP.zoom),0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffd54a';ctx.beginPath();ctx.arc(p.x,p.y,Math.max(5,Math.min(13,MAP.zoom*1.6)),0,Math.PI*2);ctx.fill();ctx.restore();if(MAP.zoom>2){ctx.fillStyle='rgba(255,213,74,.9)';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('🪙',p.x,p.y-12);}});
if(LAST){var me=w2s(gps2l(LAST.lat,LAST.lng));ctx.save();ctx.shadowBlur=18;ctx.shadowColor='#00ccff';ctx.fillStyle='#00ccff';ctx.beginPath();ctx.arc(me.x,me.y,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(me.x,me.y,4,0,Math.PI*2);ctx.fill();ctx.restore();if(HEADING!==null&&!isNaN(HEADING)){ctx.save();ctx.translate(me.x,me.y);ctx.rotate((HEADING-90)*Math.PI/180);ctx.beginPath();ctx.moveTo(20,0);ctx.lineTo(9,-7);ctx.lineTo(11,0);ctx.lineTo(9,7);ctx.closePath();ctx.fillStyle='rgba(255,255,255,.92)';ctx.shadowBlur=8;ctx.shadowColor='#ffffff';ctx.fill();ctx.restore();}}
ctx.fillStyle='rgba(255,213,74,.42)';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText(Math.round(50/MAP.zoom)+'m scale',W-8,H-8);
ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='bold 11px sans-serif';ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText('N↑',W-8,8);ctx.textBaseline='alphabetic';
}
function cardinalHdg(h){if(h===null||isNaN(h))return '---';var dirs=['N','NE','E','SE','S','SW','W','NW'];return dirs[Math.round(h/45)%8]+' '+Math.round(h)+'°';}
function stats(){var d=DIST;walkedEl.textContent=d>=1000?(d/1000).toFixed(2)+' km':Math.round(d)+' m';document.getElementById('hdg').textContent=cardinalHdg(HEADING);}
function onGPS(pos){if(!RUN)return;var lat=pos.coords.latitude,lng=pos.coords.longitude,ts=pos.timestamp;var spd=0;if(pos.coords.speed!==null&&pos.coords.speed>=0){spd=pos.coords.speed*3.6;}else if(LAST){var d=hav(LAST.lat,LAST.lng,lat,lng),dt=(ts-LAST.ts)/1000;spd=dt>0?(d/dt)*3.6:0;}SPEED=spd;if(pos.coords.heading!==null&&!isNaN(pos.coords.heading)){HEADING=pos.coords.heading;}else if(LAST){HEADING=bear(LAST.lat,LAST.lng,lat,lng);}if(LAST)DIST+=hav(LAST.lat,LAST.lng,lat,lng);LAST={lat:lat,lng:lng,ts:ts};var l=gps2l(lat,lng);PATH.push({x:l.x,y:l.y});COINS.forEach(function(c){var cl=gps2l(c.lat,c.lng);c.x=cl.x;c.y=cl.y;});fill();collect();compass();stats();MAP.auto=true;draw();}
function onErr(e){say('GPS: '+e.message);}
function resize(){var w=document.getElementById('map-wrap');cv.width=w.offsetWidth;cv.height=w.offsetHeight;draw();}
document.getElementById('start').addEventListener('click',function(){if(!navigator.geolocation){alert('Geolocation not available.');return;}document.getElementById('intro').style.display='none';RUN=true;START=Date.now();COINS=[];SEQ=0;SPAWNED=0;PATH=[];DIST=0;SPEED=0;HEADING=null;SCORE=0;CHAIN=0;LAST=null;ORIGIN=null;lastCollectAt=0;scoreEl.textContent='0';chainEl.textContent='0x';document.getElementById('hdg').textContent='---';document.getElementById('stop').disabled=false;document.getElementById('center').disabled=false;WID=navigator.geolocation.watchPosition(onGPS,onErr,{enableHighAccuracy:true,maximumAge:2000,timeout:15000});TICK=setInterval(stats,1000);say('🪙 Dash started');});
document.getElementById('stop').addEventListener('click',function(){if(WID!==null){navigator.geolocation.clearWatch(WID);WID=null;}clearInterval(TICK);RUN=false;this.disabled=true;say('Run ended — '+SCORE+' score');draw();});
document.getElementById('center').addEventListener('click',function(){MAP.auto=true;draw();say('Re-centred');});
document.getElementById('reset').addEventListener('click',function(){if(WID!==null){navigator.geolocation.clearWatch(WID);WID=null;}clearInterval(TICK);RUN=false;COINS=[];SEQ=0;SPAWNED=0;PATH=[];DIST=0;SPEED=0;HEADING=null;SCORE=0;CHAIN=0;LAST=null;ORIGIN=null;START=0;CACHE={nodes:[],lat:0,lng:0,ts:0,loading:false,pending:[]};document.getElementById('stop').disabled=true;document.getElementById('center').disabled=true;scoreEl.textContent='0';chainEl.textContent='0x';walkedEl.textContent='0 m';document.getElementById('hdg').textContent='---';document.getElementById('intro').style.display='';MAP.auto=true;draw();});
var lpd=null;cv.addEventListener('touchstart',function(e){if(e.touches.length===1){MAP.drag=true;MAP.auto=false;MAP.last={x:e.touches[0].clientX,y:e.touches[0].clientY};}},{passive:true});
cv.addEventListener('touchmove',function(e){if(e.touches.length===2){var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(lpd){MAP.zoom=Math.max(1,Math.min(90,MAP.zoom*d/lpd));draw();}lpd=d;return;}lpd=null;if(!MAP.drag||!MAP.last)return;MAP.offset.x+=e.touches[0].clientX-MAP.last.x;MAP.offset.y+=e.touches[0].clientY-MAP.last.y;MAP.last={x:e.touches[0].clientX,y:e.touches[0].clientY};draw();},{passive:true});
cv.addEventListener('touchend',function(){MAP.drag=false;MAP.last=null;lpd=null;},{passive:true});
cv.addEventListener('wheel',function(e){e.preventDefault();MAP.zoom=Math.max(1,Math.min(90,MAP.zoom*(e.deltaY>0?0.85:1.18)));MAP.auto=false;draw();},{passive:false});
window.addEventListener('resize',resize);resize();
}());
</script>
</body>
</html>
