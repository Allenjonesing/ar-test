<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>GPS Compass Test</title>
  <link rel="icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: #0a0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff; display: flex; flex-direction: column; align-items: center; }

    #header {
      width: 100%; padding: 10px 16px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(0,0,0,0.6);
    }
    #header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; color: #00ff88; }
    #back-link { font-size: 0.78rem; color: rgba(255,255,255,0.35); text-decoration: none; }
    #back-link:hover { color: #00ff88; }

    #main {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 24px; padding: 16px; width: 100%;
      overflow-y: auto;
    }

    /* Compass rose */
    #compass-wrap {
      position: relative; width: min(280px, 70vw); height: min(280px, 70vw);
      flex-shrink: 0;
    }
    #compass-canvas { display: block; width: 100%; height: 100%; }

    /* Data grid */
    .data-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      width: 100%; max-width: 420px;
    }
    .data-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(0,255,136,0.18);
      border-radius: 12px; padding: 12px 14px;
    }
    .data-label {
      font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.4); margin-bottom: 4px;
    }
    .data-value {
      font-size: 1.3rem; font-weight: 800; color: #00ff88;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 8px rgba(0,255,136,0.4);
    }
    .data-sub {
      font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 2px;
    }

    /* Calibration bar */
    #calib-section {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(0,255,136,0.18);
      border-radius: 12px; padding: 12px 14px;
    }
    #calib-section .data-label { margin-bottom: 8px; }
    #calib-bar-track {
      height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden;
    }
    #calib-bar-fill {
      height: 100%; width: 0%; background: linear-gradient(to right, #ff6b6b, #ffcc00, #00ff88);
      border-radius: 4px; transition: width 0.4s, background 0.4s;
    }
    #calib-text {
      font-size: 0.72rem; color: rgba(255,255,255,0.5); margin-top: 6px;
    }

    /* Status + controls */
    #status-text {
      font-size: 0.8rem; color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.45); padding: 5px 12px; border-radius: 6px;
      text-align: center; max-width: 420px;
    }
    #controls { display: flex; gap: 12px; }
    button {
      padding: 10px 22px; border: 2px solid #00ff88; border-radius: 24px;
      background: rgba(0,0,0,0.55); color: #00ff88; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; backdrop-filter: blur(6px);
      transition: background 0.2s, transform 0.15s;
    }
    button:hover  { background: rgba(0,255,136,0.12); transform: scale(1.04); }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>

<div id="header">
  <h1>🧭 GPS Compass Test</h1>
  <a id="back-link" href="index.html">← Home</a>
</div>

<div id="main">
  <div id="compass-wrap">
    <canvas id="compass-canvas"></canvas>
  </div>

  <div class="data-grid">
    <div class="data-card">
      <div class="data-label">Sensor Heading</div>
      <div class="data-value" id="val-sensor">—°</div>
      <div class="data-sub">Device compass</div>
    </div>
    <div class="data-card">
      <div class="data-label">GPS Bearing</div>
      <div class="data-value" id="val-gps-bearing">—°</div>
      <div class="data-sub">From movement</div>
    </div>
    <div class="data-card">
      <div class="data-label">GPS Accuracy</div>
      <div class="data-value" id="val-accuracy">—</div>
      <div class="data-sub">metres (±)</div>
    </div>
    <div class="data-card">
      <div class="data-label">Delta</div>
      <div class="data-value" id="val-delta">—°</div>
      <div class="data-sub">Sensor vs GPS</div>
    </div>
  </div>

  <div id="calib-section">
    <div class="data-label">Compass Calibration Quality</div>
    <div id="calib-bar-track"><div id="calib-bar-fill"></div></div>
    <div id="calib-text">Move to calibrate. Walk ≥ 5 m to compare GPS bearing.</div>
  </div>

  <div id="status-text">Tap Start to activate compass &amp; GPS</div>

  <div id="controls">
    <button id="start-btn">▶ Start</button>
  </div>
</div>

<script>
'use strict';

const CALIB_DIST_M = 5;   // metres of GPS travel needed for bearing comparison
const METERS_PER_DEG_LAT = 111111;

let sensorHeading = null;
let watchId = null;
let running = false;
let prevGPS = null;
let totalGPSDist = 0;
let gpsBearing = null;

const canvas = document.getElementById('compass-canvas');
const dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  const size = canvas.parentElement.clientWidth;
  canvas.width  = size * dpr;
  canvas.height = size * dpr;
  drawCompass();
}

/* ── Compass rose drawing ───────────────────────────────────────────────────── */
function drawCompass() {
  const size = canvas.width;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  const cx = size/2, cy = size/2, R = size/2 - 8*dpr;

  /* Outer ring */
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,255,136,0.3)'; ctx.lineWidth = 2*dpr; ctx.stroke();

  /* Cardinal labels */
  const cardinals = ['N','E','S','W'];
  ctx.font = `bold ${14*dpr}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  cardinals.forEach((c, i) => {
    const a = i * Math.PI/2 - Math.PI/2;
    const r = R - 18*dpr;
    const tx = cx + Math.cos(a)*r, ty = cy + Math.sin(a)*r;
    ctx.fillStyle = c === 'N' ? '#ff5555' : 'rgba(255,255,255,0.6)';
    ctx.fillText(c, tx, ty);
  });

  /* Tick marks */
  for (let i = 0; i < 72; i++) {
    const a = i * Math.PI/36 - Math.PI/2;
    const inner = i % 9 === 0 ? R - 30*dpr : i % 3 === 0 ? R - 20*dpr : R - 12*dpr;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*inner, cy + Math.sin(a)*inner);
    ctx.lineTo(cx + Math.cos(a)*(R-4*dpr), cy + Math.sin(a)*(R-4*dpr));
    ctx.strokeStyle = i % 9 === 0 ? 'rgba(0,255,136,0.6)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = (i % 9 === 0 ? 2 : 1) * dpr;
    ctx.stroke();
  }

  const heading = sensorHeading !== null ? sensorHeading : 0;
  const headRad = (heading - 90) * Math.PI/180;

  /* GPS bearing needle (blue, dashed) */
  if (gpsBearing !== null) {
    const gpRad = (gpsBearing - 90) * Math.PI/180;
    ctx.save();
    ctx.setLineDash([6*dpr, 4*dpr]);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(gpRad) * (R*0.1), cy + Math.sin(gpRad) * (R*0.1));
    ctx.lineTo(cx + Math.cos(gpRad) * (R*0.72), cy + Math.sin(gpRad) * (R*0.72));
    ctx.strokeStyle = '#00ccff'; ctx.lineWidth = 3*dpr; ctx.stroke();
    ctx.restore();
  }

  /* Sensor needle */
  if (sensorHeading !== null) {
    /* North pointer (red) */
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(headRad) * R*0.65, cy + Math.sin(headRad) * R*0.65);
    ctx.strokeStyle = '#ff5555'; ctx.lineWidth = 3.5*dpr; ctx.lineJoin = 'round';
    ctx.lineCap = 'round'; ctx.stroke();

    /* South pointer (white) */
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx - Math.cos(headRad) * R*0.45, cy - Math.sin(headRad) * R*0.45);
    ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 3*dpr; ctx.stroke();
  }

  /* Centre dot */
  ctx.beginPath(); ctx.arc(cx, cy, 7*dpr, 0, Math.PI*2);
  ctx.fillStyle = '#00ff88'; ctx.fill();

  /* Heading label */
  ctx.font = `bold ${18*dpr}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(sensorHeading !== null ? Math.round(sensorHeading) + '°' : '—', cx, cy + R*0.38);
}

/* ── Orientation ─────────────────────────────────────────────────────────────── */
function handleOrientation(evt) {
  let h = null;
  if (evt.webkitCompassHeading != null) {
    h = evt.webkitCompassHeading;
  } else if (evt.absolute && evt.alpha != null) {
    h = (360 - evt.alpha) % 360;
  } else if (evt.alpha != null) {
    h = (360 - evt.alpha) % 360;
  }
  if (h === null) return;
  sensorHeading = h;
  document.getElementById('val-sensor').textContent = Math.round(h) + '°';
  updateCalib();
  drawCompass();
}

/* ── GPS ─────────────────────────────────────────────────────────────────────── */
function haversineM(la1, lo1, la2, lo2) {
  const R = 6371000, dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
  const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearingDeg(la1, lo1, la2, lo2) {
  const dLo = (lo2-lo1)*Math.PI/180;
  const y = Math.sin(dLo)*Math.cos(la2*Math.PI/180);
  const x = Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180) -
            Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos(dLo);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}

function onGPS(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  document.getElementById('val-accuracy').textContent = Math.round(accuracy) + ' m';

  if (prevGPS) {
    const d = haversineM(prevGPS.lat, prevGPS.lng, lat, lng);
    totalGPSDist += d;
    if (totalGPSDist >= 2) {
      gpsBearing = bearingDeg(prevGPS.lat, prevGPS.lng, lat, lng);
      document.getElementById('val-gps-bearing').textContent = Math.round(gpsBearing) + '°';
      if (sensorHeading !== null) {
        let delta = Math.abs(gpsBearing - sensorHeading);
        if (delta > 180) delta = 360 - delta;
        document.getElementById('val-delta').textContent = Math.round(delta) + '°';
      }
    }
  }
  prevGPS = { lat, lng };
  updateCalib();
  drawCompass();
}

function onGPSError(err) {
  document.getElementById('status-text').textContent = 'GPS error: ' + err.message;
}

/* ── Calibration quality ─────────────────────────────────────────────────────── */
function updateCalib() {
  let score = 0;
  if (sensorHeading !== null) score += 40;
  if (totalGPSDist > 0) score += Math.min(40, (totalGPSDist / CALIB_DIST_M) * 40);
  if (gpsBearing !== null && sensorHeading !== null) {
    let delta = Math.abs(gpsBearing - sensorHeading);
    if (delta > 180) delta = 360 - delta;
    const match = Math.max(0, 20 - (delta / 18) * 20);
    score += match;
  }

  const fill = document.getElementById('calib-bar-fill');
  fill.style.width = score + '%';

  const txt = document.getElementById('calib-text');
  if (score < 40) txt.textContent = 'Waiting for sensor data…';
  else if (score < 60) txt.textContent = `Walk ${CALIB_DIST_M} m to get GPS bearing. (${Math.round(totalGPSDist)}/${CALIB_DIST_M} m)`;
  else if (score < 80) txt.textContent = `GPS bearing acquired. Delta: need more movement.`;
  else txt.textContent = `Good calibration. Compass & GPS align well.`;
}

/* ── Controls ───────────────────────────────────────────────────────────────── */
const startBtn = document.getElementById('start-btn');
startBtn.addEventListener('click', async () => {
  if (!running) {
    running = true;
    startBtn.textContent = '⏹ Stop';
    document.getElementById('status-text').textContent = 'Listening to sensors…';

    /* Request permission on iOS 13+ */
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') {
          window.addEventListener('deviceorientationabsolute', handleOrientation, true);
          window.addEventListener('deviceorientation', handleOrientation, true);
        } else {
          document.getElementById('status-text').textContent = 'Orientation permission denied.';
        }
      } catch(e) {
        document.getElementById('status-text').textContent = 'Orientation permission error: ' + e.message;
      }
    } else {
      window.addEventListener('deviceorientationabsolute', handleOrientation, true);
      window.addEventListener('deviceorientation', handleOrientation, true);
    }

    if (!navigator.geolocation) {
      document.getElementById('status-text').textContent = 'Geolocation not supported';
      return;
    }
    watchId = navigator.geolocation.watchPosition(onGPS, onGPSError, {
      enableHighAccuracy: true, maximumAge: 0
    });
  } else {
    running = false;
    startBtn.textContent = '▶ Start';
    window.removeEventListener('deviceorientationabsolute', handleOrientation, true);
    window.removeEventListener('deviceorientation', handleOrientation, true);
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    document.getElementById('status-text').textContent = 'Stopped.';
  }
});

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
</script>
</body>
</html>
