<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>GPS Compass Navigator</title>
  <link rel="icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: #080d14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      padding: 10px 16px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
    }
    #header h1 {
      margin: 0; font-size: 1.1rem; font-weight: 700; color: #00ff88;
      text-shadow: 0 0 12px rgba(0,255,136,0.4);
    }
    #back-link {
      font-size: 0.78rem; color: rgba(255,255,255,0.6); text-decoration: none;
    }
    #back-link:hover { color: #00ff88; }

    #status-bar {
      position: fixed; top: 44px; left: 0; right: 0; z-index: 20;
      padding: 6px 14px;
      display: flex; justify-content: space-between; gap: 8px;
      pointer-events: none;
    }
    .status-pill {
      font-size: 0.78rem; color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.65); padding: 4px 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* ── Compass canvas ── */
    #compass-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, calc(-50% - 60px));
      width: min(70vw, 320px);
      height: min(70vw, 320px);
    }
    #compass-canvas { width: 100%; height: 100%; display: block; }

    /* ── Distance & bearing readout ── */
    #readout {
      position: fixed;
      top: calc(50% + min(35vw, 160px) - 40px);
      left: 50%; transform: translateX(-50%);
      text-align: center; pointer-events: none;
    }
    #target-name {
      font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.9);
      text-shadow: 0 0 8px rgba(0,255,136,0.3);
      margin-bottom: 4px;
    }
    #distance-readout {
      font-size: 2.4rem; font-weight: 800; color: #00ff88;
      line-height: 1; margin-bottom: 4px;
      text-shadow: 0 0 16px rgba(0,255,136,0.5);
    }
    #bearing-readout {
      font-size: 0.85rem; color: rgba(255,255,255,0.4);
    }

    /* ── Waypoint list ── */
    #waypoint-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.1);
      padding: 12px 16px 24px;
      max-height: 44vh;
      overflow-y: auto;
      transform: translateY(calc(100% - 60px));
      transition: transform 0.35s ease;
    }
    #waypoint-panel.expanded { transform: translateY(0); }
    #panel-handle {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; margin-bottom: 10px;
    }
    #panel-handle h3 { margin: 0; font-size: 0.95rem; color: rgba(255,255,255,0.8); }
    #panel-toggle { font-size: 0.75rem; color: rgba(255,255,255,0.4); }

    .wp-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    }
    .wp-item:hover { background: rgba(255,255,255,0.03); }
    .wp-item.active { border-left: 3px solid #00ff88; padding-left: 10px; }
    .wp-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    }
    .wp-info { flex: 1; }
    .wp-name { font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.85); }
    .wp-sub  { font-size: 0.72rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .wp-dist { font-size: 0.8rem; color: #00ff88; flex-shrink: 0; }
    .wp-delete {
      font-size: 0.75rem; color: rgba(255,80,80,0.5);
      background: none; border: none; cursor: pointer; padding: 4px 8px;
    }
    .wp-delete:hover { color: #ff6b6b; }

    /* ── Bottom controls ── */
    #controls {
      position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 20;
    }
    button {
      padding: 11px 20px; border: none; border-radius: 22px; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; transition: all 0.2s;
    }
    #add-btn { background: #00ff88; color: #000; }
    #add-btn:hover { background: #00cc6f; }
    #add-btn:disabled { background: #555; color: #999; cursor: not-allowed; }
    #from-saved-btn {
      background: rgba(0,180,255,0.15); color: #00ccff;
      border: 1px solid rgba(0,180,255,0.3);
    }
    #from-saved-btn:hover { background: rgba(0,180,255,0.25); }

    /* ── Add waypoint modal ── */
    #add-modal {
      position: fixed; inset: 0; z-index: 200;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85);
    }
    #add-modal.open { display: flex; }
    .modal-box {
      background: #111820; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px; padding: 26px; width: 320px; max-width: 90vw;
    }
    .modal-box h3 { margin: 0 0 14px; font-size: 1.1rem; color: #00ff88; }
    .field-row { margin-bottom: 12px; }
    .field-row label { display: block; font-size: 0.75rem; color: rgba(255,255,255,0.4);
      margin-bottom: 5px; letter-spacing: 0.06em; text-transform: uppercase; }
    .field-row input {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: #fff; font-size: 0.9rem; outline: none;
    }
    .field-row input:focus { border-color: rgba(0,255,136,0.4); }
    .field-row input::placeholder { color: rgba(255,255,255,0.2); }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions button { flex: 1; padding: 11px 0; border-radius: 10px; font-size: 0.9rem; font-weight: 600; }
    #modal-add { background: #00ff88; color: #000; border: none; cursor: pointer; }
    #modal-add:hover { background: #00cc6f; }
    #modal-use-gps { background: rgba(0,180,255,0.15); color: #00ccff;
      border: 1px solid rgba(0,180,255,0.3); cursor: pointer; }
    #modal-cancel { background: transparent; color: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.12); cursor: pointer; }

    #info-toast {
      position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px;
      border-radius: 10px; font-size: 0.85rem; z-index: 300;
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

<div id="header">
  <h1>🧭 GPS Compass Nav</h1>
  <a id="back-link" href="index.html">← Home</a>
</div>

<div id="status-bar">
  <span class="status-pill" id="status-text">Awaiting GPS…</span>
  <span class="status-pill" id="heading-pill">Heading: —°</span>
</div>

<!-- Compass canvas -->
<canvas id="compass-canvas" id="compass-canvas"></canvas>

<div id="readout">
  <div id="target-name">No waypoint selected</div>
  <div id="distance-readout">—</div>
  <div id="bearing-readout">bearing: —°</div>
</div>

<!-- Bottom controls (above waypoint panel) -->
<div id="controls">
  <button id="add-btn" disabled>＋ Add Waypoint</button>
  <button id="from-saved-btn">Load Saved</button>
</div>

<!-- Waypoint panel (slides up) -->
<div id="waypoint-panel">
  <div id="panel-handle">
    <h3>Waypoints (<span id="wp-count">0</span>)</h3>
    <span id="panel-toggle">↑ Tap to expand</span>
  </div>
  <div id="wp-list"></div>
</div>

<!-- Add waypoint modal -->
<div id="add-modal">
  <div class="modal-box">
    <h3>＋ Add Waypoint</h3>
    <div class="field-row">
      <label>Name</label>
      <input id="wp-name-input" type="text" placeholder="Destination name" maxlength="40">
    </div>
    <div class="field-row">
      <label>Latitude</label>
      <input id="wp-lat-input" type="number" step="any" placeholder="e.g. 51.5074">
    </div>
    <div class="field-row">
      <label>Longitude</label>
      <input id="wp-lng-input" type="number" step="any" placeholder="e.g. -0.1278">
    </div>
    <div class="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-use-gps">Use GPS</button>
      <button id="modal-add">Add</button>
    </div>
  </div>
</div>

<div id="info-toast"></div>

<script>
'use strict';

/* ── State ─────────────────────────────────────────────────────────────── */
const STATE = {
  currentPos: null,   // {lat, lng, acc}
  heading: 0,         // device compass heading (degrees, 0=north)
  watchId: null,
  waypoints: [],      // [{id, name, lat, lng, color}]
  activeWpIdx: 0,     // which waypoint we're navigating to
  panelExpanded: false,
};

const STORAGE_KEY = 'nav-compass-waypoints';
const COLORS = ['#00ff88','#00ccff','#ffcc00','#ff88cc','#cc88ff','#ff9933','#88ff44','#ff6b6b'];

/* ── Compass canvas ────────────────────────────────────────────────────── */
const compassCanvas = document.getElementById('compass-canvas');
const ctx = compassCanvas.getContext('2d');
let R = 0;   // radius

function resizeCompass() {
  const wrap = compassCanvas;
  const size = Math.min(window.innerWidth * 0.7, 320);
  wrap.width = wrap.height = size * window.devicePixelRatio;
  wrap.style.width  = size + 'px';
  wrap.style.height = size + 'px';
  /* position it */
  wrap.style.position = 'fixed';
  wrap.style.left = (window.innerWidth  / 2 - size / 2) + 'px';
  wrap.style.top  = (window.innerHeight / 2 - size / 2 - 60) + 'px';
  R = (size * window.devicePixelRatio) / 2;
  drawCompass();
}
window.addEventListener('resize', resizeCompass);

function drawCompass() {
  const W = compassCanvas.width, H = compassCanvas.height;
  ctx.clearRect(0, 0, W, H);

  /* outer ring */
  ctx.save();
  ctx.translate(R, R);

  /* background disc */
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.95, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = R * 0.02;
  ctx.stroke();

  /* degree tick marks */
  for (let deg = 0; deg < 360; deg += 10) {
    const isMajor = deg % 90 === 0;
    const isMid   = deg % 30 === 0;
    const tickLen = isMajor ? R * 0.12 : isMid ? R * 0.08 : R * 0.05;
    const angle   = (deg - STATE.heading) * Math.PI / 180;
    ctx.save();
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, -(R * 0.9));
    ctx.lineTo(0, -(R * 0.9) + tickLen);
    ctx.strokeStyle = isMajor ? 'rgba(255,255,255,0.8)' : isMid ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isMajor ? R * 0.025 : R * 0.012;
    ctx.stroke();
    ctx.restore();
  }

  /* cardinal labels */
  ['N','E','S','W'].forEach((label, i) => {
    const angle = (i * 90 - STATE.heading) * Math.PI / 180;
    const dist  = R * 0.76;
    const lx = Math.sin(angle) * dist;
    const ly = -Math.cos(angle) * dist;
    ctx.save();
    ctx.translate(lx, ly);
    ctx.fillStyle = label === 'N' ? '#ff4444' : 'rgba(255,255,255,0.7)';
    ctx.font = `bold ${R * 0.13}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();
  });

  /* inner decorative rings */
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.5, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = R * 0.005;
  ctx.stroke();

  /* bearing needle to active waypoint */
  if (STATE.waypoints.length > 0 && STATE.currentPos) {
    const wp = STATE.waypoints[STATE.activeWpIdx];
    if (wp) {
      const bearing = calcBearing(STATE.currentPos.lat, STATE.currentPos.lng, wp.lat, wp.lng);
      const needleAngle = (bearing - STATE.heading) * Math.PI / 180;
      const color = wp.color || '#00ff88';

      ctx.save();
      ctx.rotate(needleAngle);
      /* needle body */
      ctx.beginPath();
      ctx.moveTo(0, -(R * 0.6));
      ctx.lineTo(R * 0.05, -(R * 0.25));
      ctx.lineTo(-R * 0.05, -(R * 0.25));
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      /* needle tip glow */
      ctx.beginPath();
      ctx.arc(0, -(R * 0.6), R * 0.04, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();

      /* distance label on needle */
      const dist = calcDistM(STATE.currentPos.lat, STATE.currentPos.lng, wp.lat, wp.lng);
      const distStr = dist >= 1000 ? (dist/1000).toFixed(1) + ' km' : Math.round(dist) + ' m';
      document.getElementById('distance-readout').textContent = distStr;
      document.getElementById('target-name').textContent = wp.emoji ? `${wp.emoji} ${wp.name}` : wp.name;
      document.getElementById('bearing-readout').textContent =
        `bearing ${Math.round(bearing)}°  ·  yours ${Math.round(STATE.heading)}°`;
    }
  } else {
    document.getElementById('distance-readout').textContent = '—';
    document.getElementById('target-name').textContent = 'No waypoint selected';
    document.getElementById('bearing-readout').textContent = 'Add a waypoint to start navigating';
  }

  /* north pointer (fixed, top of compass) */
  ctx.beginPath();
  ctx.moveTo(0, -(R * 0.95));
  ctx.lineTo(R * 0.03, -(R * 0.82));
  ctx.lineTo(-R * 0.03, -(R * 0.82));
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fill();

  /* centre dot */
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.05, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  ctx.restore();
}

/* ── Coordinate maths ──────────────────────────────────────────────────── */
function calcBearing(lat1, lng1, lat2, lng2) {
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δλ = (lng2 - lng1) * Math.PI / 180;
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

function calcDistM(lat1, lng1, lat2, lng2) {
  const R = 6371000, dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ── GPS ───────────────────────────────────────────────────────────────── */
function onGPSSuccess(pos) {
  const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;
  STATE.currentPos = { lat, lng, acc };
  document.getElementById('status-text').textContent =
    `GPS ±${Math.round(acc)}m`;
  document.getElementById('add-btn').disabled = false;
  updateWPDistances();
  drawCompass();
}

function onGPSError(err) {
  document.getElementById('status-text').textContent = `GPS: ${err.message}`;
}

/* ── Heading (compass) ─────────────────────────────────────────────────── */
function onOrientation(evt) {
  let h = null;
  if (evt.webkitCompassHeading != null) h = evt.webkitCompassHeading;
  else if (evt.absolute && evt.alpha != null) h = (360 - evt.alpha) % 360;
  if (h == null) return;
  STATE.heading = h;
  document.getElementById('heading-pill').textContent = `Heading: ${Math.round(h)}°`;
  drawCompass();
}

function setupCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(s => { if (s === 'granted') window.addEventListener('deviceorientation', onOrientation, true); })
      .catch(() => {});
  } else {
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation', onOrientation, true);
  }
}

/* ── Waypoint management ───────────────────────────────────────────────── */
function loadWaypoints() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    STATE.waypoints = saved;
    renderWPList();
  } catch (e) {}
}

function saveWaypoints() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE.waypoints)); } catch (e) {}
}

function addWaypoint(name, lat, lng) {
  const color = COLORS[STATE.waypoints.length % COLORS.length];
  STATE.waypoints.push({ id: Date.now(), name, lat, lng, color });
  STATE.activeWpIdx = STATE.waypoints.length - 1;
  saveWaypoints();
  renderWPList();
  drawCompass();
  toast(`📍 "${name}" added`);
}

function removeWaypoint(id) {
  STATE.waypoints = STATE.waypoints.filter(w => w.id !== id);
  if (STATE.activeWpIdx >= STATE.waypoints.length) STATE.activeWpIdx = 0;
  saveWaypoints();
  renderWPList();
  drawCompass();
}

function renderWPList() {
  document.getElementById('wp-count').textContent = STATE.waypoints.length;
  const list = document.getElementById('wp-list');
  list.innerHTML = '';

  if (STATE.waypoints.length === 0) {
    list.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:0.82rem;padding:12px 0">No waypoints yet. Tap "＋ Add Waypoint" to begin.</div>';
    return;
  }

  STATE.waypoints.forEach((wp, i) => {
    const div = document.createElement('div');
    div.className = 'wp-item' + (i === STATE.activeWpIdx ? ' active' : '');

    let distStr = '—';
    if (STATE.currentPos) {
      const d = calcDistM(STATE.currentPos.lat, STATE.currentPos.lng, wp.lat, wp.lng);
      distStr = d >= 1000 ? (d/1000).toFixed(1) + ' km' : Math.round(d) + ' m';
    }

    div.innerHTML = `
      <div class="wp-dot" style="background:${wp.color}"></div>
      <div class="wp-info">
        <div class="wp-name">${wp.name}</div>
        <div class="wp-sub">${wp.lat.toFixed(5)}, ${wp.lng.toFixed(5)}</div>
      </div>
      <span class="wp-dist">${distStr}</span>
      <button class="wp-delete" data-id="${wp.id}">✕</button>
    `;
    div.addEventListener('click', e => {
      if (e.target.classList.contains('wp-delete')) return;
      STATE.activeWpIdx = i;
      renderWPList();
      drawCompass();
      toast(`Navigating to "${wp.name}"`);
    });
    div.querySelector('.wp-delete').addEventListener('click', e => {
      e.stopPropagation();
      if (confirm(`Remove "${wp.name}"?`)) removeWaypoint(wp.id);
    });
    list.appendChild(div);
  });
}

function updateWPDistances() {
  if (!STATE.currentPos) return;
  /* update distance display in list */
  renderWPList();
}

/* ── Load from world-builder saved places ──────────────────────────────── */
document.getElementById('from-saved-btn').addEventListener('click', () => {
  try {
    const places = JSON.parse(localStorage.getItem('world-builder-places') || '[]');
    if (places.length === 0) { toast('No saved places from World Builder'); return; }
    let added = 0;
    places.forEach(p => {
      if (!STATE.waypoints.find(w => w.lat === p.lat && w.lng === p.lng)) {
        addWaypoint((p.emoji ? p.emoji + ' ' : '') + p.name, p.lat, p.lng);
        added++;
      }
    });
    toast(added > 0 ? `Loaded ${added} places from World Builder` : 'All places already added');
  } catch (e) {
    toast('Could not load saved places');
  }
});

/* ── Waypoint panel toggle ─────────────────────────────────────────────── */
document.getElementById('panel-handle').addEventListener('click', () => {
  STATE.panelExpanded = !STATE.panelExpanded;
  document.getElementById('waypoint-panel').classList.toggle('expanded', STATE.panelExpanded);
  document.getElementById('panel-toggle').textContent = STATE.panelExpanded ? '↓ Collapse' : '↑ Tap to expand';
});

/* ── Add modal ─────────────────────────────────────────────────────────── */
document.getElementById('add-btn').addEventListener('click', () => {
  document.getElementById('wp-name-input').value = '';
  document.getElementById('wp-lat-input').value = '';
  document.getElementById('wp-lng-input').value = '';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('wp-name-input').focus(), 100);
});

document.getElementById('modal-use-gps').addEventListener('click', () => {
  if (!STATE.currentPos) { toast('No GPS fix yet'); return; }
  document.getElementById('wp-lat-input').value = STATE.currentPos.lat.toFixed(6);
  document.getElementById('wp-lng-input').value = STATE.currentPos.lng.toFixed(6);
});

document.getElementById('modal-add').addEventListener('click', () => {
  const name = document.getElementById('wp-name-input').value.trim() || 'Waypoint ' + (STATE.waypoints.length + 1);
  const lat = parseFloat(document.getElementById('wp-lat-input').value);
  const lng = parseFloat(document.getElementById('wp-lng-input').value);
  if (isNaN(lat) || isNaN(lng)) { toast('Enter valid lat/lng'); return; }
  if (lat < -90 || lat > 90)   { toast('Latitude must be −90 to 90'); return; }
  if (lng < -180 || lng > 180) { toast('Longitude must be −180 to 180'); return; }
  addWaypoint(name, lat, lng);
  document.getElementById('add-modal').classList.remove('open');
});

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('add-modal').classList.remove('open');
});

/* ── Toast ─────────────────────────────────────────────────────────────── */
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('info-toast');
  el.textContent = msg;
  el.style.opacity = '1';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

/* ── Boot ──────────────────────────────────────────────────────────────── */
loadWaypoints();
setupCompass();
resizeCompass();

if (!navigator.geolocation) {
  document.getElementById('status-text').textContent = 'Geolocation not supported';
} else {
  STATE.watchId = navigator.geolocation.watchPosition(onGPSSuccess, onGPSError, {
    enableHighAccuracy: true, maximumAge: 0, timeout: 15000,
  });
}

/* Render loop for smooth compass animation */
(function loop() {
  requestAnimationFrame(loop);
  drawCompass();
}());
</script>
</body>
</html>
