<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>GPS World Builder</title>
  <link rel="icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: #0a0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }

    #world-canvas {
      position: fixed; inset: 0; display: block; touch-action: none;
    }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      padding: 10px 16px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: none;
    }
    #header h1 {
      margin: 0; font-size: 1.1rem; font-weight: 700; color: #00ff88;
      text-shadow: 0 0 12px rgba(0,255,136,0.4);
    }
    #back-link {
      font-size: 0.78rem; color: rgba(255,255,255,0.6); text-decoration: none;
      pointer-events: all;
    }
    #back-link:hover { color: #00ff88; }

    #status-bar {
      position: fixed; top: 44px; left: 0; right: 0; z-index: 20;
      padding: 6px 14px;
      display: flex; justify-content: space-between; gap: 8px;
      pointer-events: none;
    }
    .status-pill {
      font-size: 0.78rem; color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    #hud {
      position: fixed; top: 84px; left: 14px;
      z-index: 20; pointer-events: none;
    }
    .hud-stat {
      font-size: 0.75rem; color: rgba(255,255,255,0.45);
      line-height: 1.9;
    }
    .hud-stat strong { color: #00ff88; }

    #controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; z-index: 20;
    }
    button {
      padding: 11px 20px; border: none; border-radius: 22px; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; transition: all 0.2s;
    }
    #mark-btn { background: #00ff88; color: #000; }
    #mark-btn:hover { background: #00cc6f; }
    #mark-btn:disabled { background: #555; color: #999; cursor: not-allowed; }
    #track-btn {
      background: rgba(0,180,255,0.15); color: #00ccff;
      border: 1px solid rgba(0,180,255,0.3);
    }
    #track-btn:hover { background: rgba(0,180,255,0.25); }
    #export-btn {
      background: rgba(255,200,0,0.12); color: #ffcc00;
      border: 1px solid rgba(255,200,0,0.3);
    }
    #export-btn:hover { background: rgba(255,200,0,0.22); }
    #clear-btn {
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.12);
    }
    #clear-btn:hover { background: rgba(255,80,80,0.15); color: #ff6b6b; border-color: #ff6b6b; }

    /* Name place modal */
    #name-modal {
      position: fixed; inset: 0; z-index: 200;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.8);
    }
    #name-modal.open { display: flex; }
    .modal-box {
      background: #111820; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px; padding: 28px; width: 320px; max-width: 90vw;
      text-align: center;
    }
    .modal-box h3 { margin: 0 0 16px; font-size: 1.2rem; color: #00ff88; }
    .modal-box p { margin: 0 0 16px; font-size: 0.85rem; color: rgba(255,255,255,0.5); }

    .emoji-picker {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      margin: 0 0 16px;
    }
    .emoji-opt {
      font-size: 1.4rem; cursor: pointer; padding: 4px;
      border-radius: 8px; border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .emoji-opt.selected { border-color: #00ff88; }
    .emoji-opt:hover { border-color: rgba(0,255,136,0.5); }

    #place-name-input {
      width: 100%; padding: 10px 14px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; color: #fff; font-size: 0.95rem;
      outline: none; margin-bottom: 16px;
    }
    #place-name-input:focus { border-color: rgba(0,255,136,0.5); }
    #place-name-input::placeholder { color: rgba(255,255,255,0.25); }

    .modal-actions { display: flex; gap: 10px; justify-content: center; }
    .modal-actions button {
      flex: 1; padding: 11px 0; border-radius: 12px; font-size: 0.9rem; font-weight: 600;
    }
    #modal-save { background: #00ff88; color: #000; border: none; cursor: pointer; }
    #modal-save:hover { background: #00cc6f; }
    #modal-cancel { background: transparent; color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.15); cursor: pointer; }
    #modal-cancel:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

    /* Place detail popup */
    #place-popup {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px; padding: 14px 20px;
      font-size: 0.85rem; z-index: 50;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
      min-width: 220px; text-align: center;
    }
    #place-popup.visible { opacity: 1; }
    #place-popup .pp-name { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    #place-popup .pp-coord { color: rgba(255,255,255,0.4); font-size: 0.75rem; }
    #place-popup .pp-dist { color: #00ff88; font-size: 0.8rem; margin-top: 4px; }

    #info-toast {
      position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px;
      border-radius: 10px; font-size: 0.85rem; z-index: 100;
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

<canvas id="world-canvas"></canvas>

<div id="header">
  <h1>🌍 GPS World Builder</h1>
  <a id="back-link" href="index.html">← Home</a>
</div>

<div id="status-bar">
  <span class="status-pill" id="status-text">Awaiting GPS…</span>
  <span class="status-pill" id="acc-text">Acc: —</span>
</div>

<div id="hud">
  <div class="hud-stat">Places: <strong id="hud-places">0</strong></div>
  <div class="hud-stat">Trail: <strong id="hud-dist">0 m</strong></div>
</div>

<div id="controls">
  <button id="mark-btn" disabled>📌 Mark Place</button>
  <button id="track-btn">▶ Track Path</button>
  <button id="export-btn">⬇ Export</button>
  <button id="clear-btn">✕ Clear All</button>
</div>

<!-- Name Place Modal -->
<div id="name-modal">
  <div class="modal-box">
    <h3>📌 Name this place</h3>
    <p>Give this GPS location a name and pick an icon.</p>
    <div class="emoji-picker" id="emoji-picker">
      <span class="emoji-opt selected" data-emoji="📍">📍</span>
      <span class="emoji-opt" data-emoji="🏠">🏠</span>
      <span class="emoji-opt" data-emoji="☕">☕</span>
      <span class="emoji-opt" data-emoji="🌳">🌳</span>
      <span class="emoji-opt" data-emoji="🏔️">🏔️</span>
      <span class="emoji-opt" data-emoji="🏖️">🏖️</span>
      <span class="emoji-opt" data-emoji="🏪">🏪</span>
      <span class="emoji-opt" data-emoji="⭐">⭐</span>
      <span class="emoji-opt" data-emoji="🚀">🚀</span>
      <span class="emoji-opt" data-emoji="❤️">❤️</span>
    </div>
    <input id="place-name-input" type="text" placeholder="e.g. My House, Coffee Shop…" maxlength="40">
    <div class="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-save">Save Place</button>
    </div>
  </div>
</div>

<!-- Place popup (tap on a marker to see) -->
<div id="place-popup">
  <div class="pp-name" id="pp-name"></div>
  <div class="pp-coord" id="pp-coord"></div>
  <div class="pp-dist" id="pp-dist"></div>
</div>

<div id="info-toast"></div>

<script>
'use strict';

/* ── State ─────────────────────────────────────────────────────────────── */
const STATE = {
  gpsReady: false,
  trackingPath: false,
  watchId: null,
  currentPos: null,   // {lat, lng, acc}
  origin: null,       // {lat, lng} first fix
  places: [],         // [{id, lat, lng, name, emoji, ts}]
  path: [],           // [{lat, lng}] trail
  totalDistM: 0,
  zoom: 6,
  panX: 0, panY: 0,
};

const STORAGE_PLACES_KEY = 'world-builder-places';
const STORAGE_PATH_KEY   = 'world-builder-path';

/* ── Persistence ───────────────────────────────────────────────────────── */
function loadSaved() {
  try {
    const places = JSON.parse(localStorage.getItem(STORAGE_PLACES_KEY) || '[]');
    const path   = JSON.parse(localStorage.getItem(STORAGE_PATH_KEY)   || '[]');
    STATE.places = places;
    STATE.path   = path;
    if (places.length > 0 || path.length > 0) {
      const ref = places[0] || path[0];
      if (ref) STATE.origin = { lat: ref.lat, lng: ref.lng };
      recalcDist();
      updateHUD();
      toast(`Loaded ${places.length} places, ${path.length} trail points`);
    }
  } catch (e) {}
}

function savePlaces() {
  try { localStorage.setItem(STORAGE_PLACES_KEY, JSON.stringify(STATE.places)); } catch (e) {}
}
function savePath() {
  try { localStorage.setItem(STORAGE_PATH_KEY, JSON.stringify(STATE.path.slice(-2000))); } catch (e) {}
}

/* ── Canvas ────────────────────────────────────────────────────────────── */
const canvas = document.getElementById('world-canvas');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  draw();
}
window.addEventListener('resize', resize);

/* ── Coordinate maths ──────────────────────────────────────────────────── */
const M_PER_DEG_LAT = 111111;

function geoToMeters(lat, lng) {
  if (!STATE.origin) return { x: 0, y: 0 };
  const cos = Math.cos(STATE.origin.lat * Math.PI / 180);
  return {
    x:  (lng - STATE.origin.lng) * M_PER_DEG_LAT * cos,
    y: -(lat - STATE.origin.lat) * M_PER_DEG_LAT,
  };
}

function metersToScreen(mx, my) {
  const cx = W / 2 + STATE.panX;
  const cy = H / 2 + STATE.panY;
  return { sx: cx + mx * STATE.zoom, sy: cy + my * STATE.zoom };
}

function haversineM(lat1, lng1, lat2, lng2) {
  const R = 6371000, dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function recalcDist() {
  let d = 0;
  for (let i = 1; i < STATE.path.length; i++) {
    d += haversineM(STATE.path[i-1].lat, STATE.path[i-1].lng,
                    STATE.path[i].lat,   STATE.path[i].lng);
  }
  STATE.totalDistM = d;
}

/* ── Draw ──────────────────────────────────────────────────────────────── */
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0f1a';
  ctx.fillRect(0, 0, W, H);

  if (!STATE.origin) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '15px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GPS World Builder — mark named places as you explore', W/2, H/2);
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.font = '12px sans-serif';
    ctx.fillText('GPS accuracy needed. Tap "Mark Place" to drop a named pin.', W/2, H/2 + 26);
    return;
  }

  /* grid */
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.5;
  const step = 10 * STATE.zoom;
  const cx = W / 2 + STATE.panX, cy = H / 2 + STATE.panY;
  for (let gx = cx % step - step; gx < W + step; gx += step) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (let gy = cy % step - step; gy < H + step; gy += step) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  /* trail path */
  if (STATE.path.length >= 2) {
    ctx.beginPath();
    STATE.path.forEach((p, i) => {
      const m = geoToMeters(p.lat, p.lng);
      const s = metersToScreen(m.x, m.y);
      if (i === 0) ctx.moveTo(s.sx, s.sy);
      else ctx.lineTo(s.sx, s.sy);
    });
    ctx.strokeStyle = 'rgba(0,200,255,0.35)';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  /* current position */
  if (STATE.currentPos) {
    const m = geoToMeters(STATE.currentPos.lat, STATE.currentPos.lng);
    const s = metersToScreen(m.x, m.y);
    /* accuracy ring */
    const accR = Math.max(3, (STATE.currentPos.acc || 10) * STATE.zoom);
    ctx.beginPath();
    ctx.arc(s.sx, s.sy, accR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,255,136,0.07)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,255,136,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
    /* dot */
    ctx.beginPath();
    ctx.arc(s.sx, s.sy, 8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,255,136,0.2)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s.sx, s.sy, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#00ff88';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  /* places */
  STATE.places.forEach(place => {
    const m = geoToMeters(place.lat, place.lng);
    const s = metersToScreen(m.x, m.y);
    /* glow ring */
    ctx.beginPath();
    ctx.arc(s.sx, s.sy, 16, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,200,0,0.1)';
    ctx.fill();
    /* emoji */
    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(place.emoji || '📍', s.sx, s.sy - 2);
    /* name label */
    ctx.font = '11px sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(place.name, s.sx, s.sy + 12);
  });
}

/* ── GPS ───────────────────────────────────────────────────────────────── */
const MIN_MOVE_M = 3;
let lastPathGPS = null;

function onGPSSuccess(pos) {
  const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;
  STATE.currentPos = { lat, lng, acc };
  document.getElementById('acc-text').textContent = `Acc: ±${Math.round(acc)}m`;

  if (!STATE.origin) {
    STATE.origin = { lat, lng };
    STATE.gpsReady = true;
    document.getElementById('mark-btn').disabled = false;
    document.getElementById('status-text').textContent = 'GPS ready';
  }

  /* track path */
  if (STATE.trackingPath) {
    if (!lastPathGPS) {
      lastPathGPS = { lat, lng };
      STATE.path.push({ lat, lng });
    } else {
      const d = haversineM(lastPathGPS.lat, lastPathGPS.lng, lat, lng);
      if (d >= MIN_MOVE_M) {
        STATE.totalDistM += d;
        STATE.path.push({ lat, lng });
        lastPathGPS = { lat, lng };
        savePath();
        updateHUD();
      }
    }
  }

  centerOnCurrent();
  draw();
}

function onGPSError(err) {
  document.getElementById('status-text').textContent = `GPS: ${err.message}`;
}

function startGPS() {
  STATE.watchId = navigator.geolocation.watchPosition(onGPSSuccess, onGPSError, {
    enableHighAccuracy: true, maximumAge: 0, timeout: 15000,
  });
}

/* ── Mark place ────────────────────────────────────────────────────────── */
let pendingPlace = null;
let selectedEmoji = '📍';

document.getElementById('mark-btn').addEventListener('click', () => {
  if (!STATE.currentPos) { toast('No GPS fix yet'); return; }
  pendingPlace = { ...STATE.currentPos };
  selectedEmoji = '📍';
  document.querySelectorAll('.emoji-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.emoji === '📍');
  });
  document.getElementById('place-name-input').value = '';
  document.getElementById('name-modal').classList.add('open');
  setTimeout(() => document.getElementById('place-name-input').focus(), 100);
});

document.querySelectorAll('.emoji-opt').forEach(el => {
  el.addEventListener('click', () => {
    selectedEmoji = el.dataset.emoji;
    document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
  });
});

document.getElementById('modal-save').addEventListener('click', () => {
  const name = document.getElementById('place-name-input').value.trim() || 'Place ' + (STATE.places.length + 1);
  if (!pendingPlace) return;
  const place = {
    id: Date.now(),
    lat: pendingPlace.lat,
    lng: pendingPlace.lng,
    name,
    emoji: selectedEmoji,
    ts: Date.now(),
  };
  if (!STATE.origin) STATE.origin = { lat: place.lat, lng: place.lng };
  STATE.places.push(place);
  savePlaces();
  updateHUD();
  draw();
  document.getElementById('name-modal').classList.remove('open');
  toast(`✅ "${name}" saved!`);
  pendingPlace = null;
});

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('name-modal').classList.remove('open');
  pendingPlace = null;
});

/* ── Track path toggle ─────────────────────────────────────────────────── */
document.getElementById('track-btn').addEventListener('click', () => {
  STATE.trackingPath = !STATE.trackingPath;
  const btn = document.getElementById('track-btn');
  if (STATE.trackingPath) {
    btn.textContent = '⏹ Stop Path';
    btn.style.background = 'rgba(255,80,80,0.2)';
    btn.style.color = '#ff6b6b';
    btn.style.borderColor = '#ff6b6b';
    lastPathGPS = null;
    document.getElementById('status-text').textContent = 'Recording path…';
  } else {
    btn.textContent = '▶ Track Path';
    btn.style.background = 'rgba(0,180,255,0.15)';
    btn.style.color = '#00ccff';
    btn.style.borderColor = 'rgba(0,180,255,0.3)';
    document.getElementById('status-text').textContent = 'GPS ready';
    toast(`Path recorded: ${STATE.path.length} points`);
  }
});

/* ── Export ────────────────────────────────────────────────────────────── */
document.getElementById('export-btn').addEventListener('click', () => {
  if (STATE.places.length === 0 && STATE.path.length === 0) {
    toast('Nothing to export yet'); return;
  }
  const features = [];

  if (STATE.path.length >= 2) {
    features.push({
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: STATE.path.map(p => [p.lng, p.lat]) },
      properties: { type: 'trail', totalDistanceM: Math.round(STATE.totalDistM) },
    });
  }

  STATE.places.forEach(p => {
    features.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
      properties: { name: p.name, emoji: p.emoji, timestamp: new Date(p.ts).toISOString() },
    });
  });

  const blob = new Blob([JSON.stringify({ type: 'FeatureCollection', features }, null, 2)],
    { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'my-world.geojson'; a.click();
  URL.revokeObjectURL(url);
  toast('World exported as GeoJSON!');
});

/* ── Clear ─────────────────────────────────────────────────────────────── */
document.getElementById('clear-btn').addEventListener('click', () => {
  if (!confirm('Delete ALL places and trail?')) return;
  STATE.places = [];
  STATE.path = [];
  STATE.totalDistM = 0;
  STATE.origin = null;
  STATE.trackingPath = false;
  lastPathGPS = null;
  localStorage.removeItem(STORAGE_PLACES_KEY);
  localStorage.removeItem(STORAGE_PATH_KEY);
  const btn = document.getElementById('track-btn');
  btn.textContent = '▶ Track Path';
  btn.style.background = 'rgba(0,180,255,0.15)';
  btn.style.color = '#00ccff';
  btn.style.borderColor = 'rgba(0,180,255,0.3)';
  document.getElementById('mark-btn').disabled = !STATE.gpsReady;
  updateHUD();
  draw();
  toast('Cleared');
});

/* ── Canvas tap → show place popup ────────────────────────────────────── */
const TAP_RADIUS = 28;
let popupTimer = null;

canvas.addEventListener('click', e => {
  const mx = e.clientX, my = e.clientY;
  for (const place of STATE.places) {
    const m = geoToMeters(place.lat, place.lng);
    const s = metersToScreen(m.x, m.y);
    if (Math.hypot(s.sx - mx, s.sy - my) < TAP_RADIUS) {
      showPlacePopup(place);
      return;
    }
  }
});

function showPlacePopup(place) {
  document.getElementById('pp-name').textContent = place.emoji + ' ' + place.name;
  document.getElementById('pp-coord').textContent =
    place.lat.toFixed(6) + ', ' + place.lng.toFixed(6);
  let distTxt = '';
  if (STATE.currentPos) {
    const d = haversineM(STATE.currentPos.lat, STATE.currentPos.lng, place.lat, place.lng);
    distTxt = d >= 1000 ? (d/1000).toFixed(2) + ' km away' : Math.round(d) + ' m away';
  }
  document.getElementById('pp-dist').textContent = distTxt;
  const popup = document.getElementById('place-popup');
  popup.classList.add('visible');
  if (popupTimer) clearTimeout(popupTimer);
  popupTimer = setTimeout(() => popup.classList.remove('visible'), 4000);
}

/* ── Touch/mouse pan ───────────────────────────────────────────────────── */
let lastTouch = null, mouseDrag = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && lastTouch) {
    STATE.panX += e.touches[0].clientX - lastTouch.x;
    STATE.panY += e.touches[0].clientY - lastTouch.y;
    lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    draw();
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { lastTouch = null; });
canvas.addEventListener('mousedown', e => { mouseDrag = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mousemove', e => {
  if (mouseDrag) {
    STATE.panX += e.clientX - mouseDrag.x;
    STATE.panY += e.clientY - mouseDrag.y;
    mouseDrag = { x: e.clientX, y: e.clientY };
    draw();
  }
});
canvas.addEventListener('mouseup', () => { mouseDrag = null; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  STATE.zoom = Math.max(1, Math.min(200, STATE.zoom * (e.deltaY < 0 ? 1.15 : 0.87)));
  draw();
}, { passive: false });

/* ── Helpers ───────────────────────────────────────────────────────────── */
function centerOnCurrent() {
  if (!STATE.currentPos || !STATE.origin) return;
  const m = geoToMeters(STATE.currentPos.lat, STATE.currentPos.lng);
  STATE.panX = -(m.x * STATE.zoom);
  STATE.panY = -(m.y * STATE.zoom);
}

function updateHUD() {
  document.getElementById('hud-places').textContent = STATE.places.length;
  const d = STATE.totalDistM;
  document.getElementById('hud-dist').textContent =
    d >= 1000 ? (d/1000).toFixed(2) + ' km' : Math.round(d) + ' m';
}

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('info-toast');
  el.textContent = msg;
  el.style.opacity = '1';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

/* ── Boot ──────────────────────────────────────────────────────────────── */
loadSaved();
resize();

if (!navigator.geolocation) {
  document.getElementById('status-text').textContent = 'Geolocation not supported';
} else {
  startGPS();
}
</script>
</body>
</html>
