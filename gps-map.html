<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>2D GPS Map Tracker</title>
  <link rel="icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: #0a0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      padding: 10px 16px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
    }
    #header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; color: #00ff88;
      text-shadow: 0 0 12px rgba(0,255,136,0.4); }
    #back-link { font-size: 0.78rem; color: rgba(255,255,255,0.35); text-decoration: none; }
    #back-link:hover { color: #00ff88; }

    #status-bar {
      position: fixed; top: 44px; left: 0; right: 0; z-index: 20;
      padding: 6px 14px;
      display: flex; justify-content: space-between; gap: 8px;
      pointer-events: none;
    }
    #status-text {
      font-size: 0.78rem; color: rgba(255,255,255,0.65);
      background: rgba(0,0,0,0.55); padding: 4px 10px; border-radius: 6px;
    }
    #accuracy-badge {
      font-size: 0.78rem; color: #00ccff;
      background: rgba(0,0,0,0.55); padding: 4px 10px; border-radius: 6px;
    }

    #map-canvas {
      position: fixed; inset: 0; display: block; width: 100%; height: 100%;
      touch-action: none;
    }

    #hud {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; pointer-events: none; z-index: 20;
    }
    .hud-block {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(0,0,0,0.65); border: 1px solid rgba(0,255,136,0.25);
      border-radius: 10px; padding: 8px 14px; min-width: 80px;
      backdrop-filter: blur(6px);
    }
    .hud-label { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.45); }
    .hud-value { font-size: 1.05rem; font-weight: 800; color: #00ff88;
      font-variant-numeric: tabular-nums; text-shadow: 0 0 8px rgba(0,255,136,0.45); }

    #controls {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; z-index: 20;
    }
    button {
      padding: 10px 22px; border: 2px solid #00ff88; border-radius: 24px;
      background: rgba(0,0,0,0.55); color: #00ff88; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; backdrop-filter: blur(6px);
      transition: background 0.2s, transform 0.15s;
    }
    button:hover  { background: rgba(0,255,136,0.12); transform: scale(1.04); }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    #clear-btn {
      border-color: rgba(255,80,80,0.6); color: #ff6b6b;
      background: rgba(255,50,50,0.06);
    }
    #clear-btn:hover { background: rgba(255,50,50,0.14); }
  </style>
</head>
<body>

<canvas id="map-canvas"></canvas>

<div id="header">
  <h1>🗺 2D GPS Map Tracker</h1>
  <a id="back-link" href="index.html">← Home</a>
</div>

<div id="status-bar">
  <span id="status-text">Tap Start to begin tracking</span>
  <span id="accuracy-badge" style="display:none">±— m</span>
</div>

<div id="hud">
  <div class="hud-block">
    <span class="hud-label">Walked</span>
    <span class="hud-value" id="hud-dist">0 m</span>
  </div>
  <div class="hud-block">
    <span class="hud-label">Points</span>
    <span class="hud-value" id="hud-pts">0</span>
  </div>
  <div class="hud-block">
    <span class="hud-label">Lat</span>
    <span class="hud-value" id="hud-lat">—</span>
  </div>
  <div class="hud-block">
    <span class="hud-label">Lng</span>
    <span class="hud-value" id="hud-lng">—</span>
  </div>
</div>

<div id="controls">
  <button id="start-btn">▶ Start</button>
  <button id="clear-btn" disabled>✕ Clear</button>
</div>

<script>
'use strict';

/* ── Constants ─────────────────────────────────────────────────────────────── */
const MIN_MOVE_M   = 2;      // metres threshold to register a new GPS point
const ZOOM_PAD     = 0.15;   // fraction of canvas to pad around the path bounds
const METERS_PER_DEG_LAT = 111111;

/* ── State ──────────────────────────────────────────────────────────────────── */
let tracking  = false;
let watchId   = null;
let path      = [];   // [{lat, lng}]
let totalDist = 0;
let lastPt    = null;

/* ── Elements ───────────────────────────────────────────────────────────────── */
const canvas      = document.getElementById('map-canvas');
const ctx         = canvas.getContext('2d');
const statusText  = document.getElementById('status-text');
const accBadge    = document.getElementById('accuracy-badge');
const hudDist     = document.getElementById('hud-dist');
const hudPts      = document.getElementById('hud-pts');
const hudLat      = document.getElementById('hud-lat');
const hudLng      = document.getElementById('hud-lng');
const startBtn    = document.getElementById('start-btn');
const clearBtn    = document.getElementById('clear-btn');

/* ── Helpers ────────────────────────────────────────────────────────────────── */
function haversineM(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(m) {
  return m >= 1000 ? (m/1000).toFixed(2) + ' km' : Math.round(m) + ' m';
}

/* ── GPS ────────────────────────────────────────────────────────────────────── */
function onGPS(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  accBadge.style.display = '';
  accBadge.textContent = `±${Math.round(accuracy)} m`;
  hudLat.textContent = lat.toFixed(5);
  hudLng.textContent = lng.toFixed(5);

  if (lastPt) {
    const d = haversineM(lastPt.lat, lastPt.lng, lat, lng);
    if (d < MIN_MOVE_M) return;
    totalDist += d;
  }
  lastPt = { lat, lng };
  path.push({ lat, lng });
  hudDist.textContent = fmtDist(totalDist);
  hudPts.textContent  = path.length;
  statusText.textContent = `Tracking… ${path.length} pts`;
  drawMap();
}

function onGPSError(err) {
  statusText.textContent = `GPS error: ${err.message}`;
}

/* ── Drawing ────────────────────────────────────────────────────────────────── */
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  drawMap();
}

function drawMap() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  /* Dark background grid */
  ctx.fillStyle = '#0a0f1a';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(0,255,136,0.06)';
  ctx.lineWidth = 1;
  const gridSz = 40;
  for (let x = 0; x < W; x += gridSz) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += gridSz) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  if (path.length === 0) {
    ctx.fillStyle = 'rgba(0,255,136,0.25)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Waiting for GPS path…', W/2, H/2);
    return;
  }

  /* Compute bounding box in GPS coords */
  let minLat = Infinity, maxLat = -Infinity, minLng = Infinity, maxLng = -Infinity;
  for (const p of path) {
    if (p.lat < minLat) minLat = p.lat;
    if (p.lat > maxLat) maxLat = p.lat;
    if (p.lng < minLng) minLng = p.lng;
    if (p.lng > maxLng) maxLng = p.lng;
  }

  const latSpan = maxLat - minLat || 0.0005;
  const lngSpan = maxLng - minLng || 0.0005;
  const pad = ZOOM_PAD;
  const drawW = W * (1 - 2*pad);
  const drawH = (H - 120) * (1 - 2*pad);

  /* Scale to maintain aspect ratio */
  const latM = latSpan * METERS_PER_DEG_LAT;
  const lngM = lngSpan * METERS_PER_DEG_LAT * Math.cos(((minLat+maxLat)/2) * Math.PI/180);
  const scale = Math.min(drawW / (lngM || 1), drawH / (latM || 1));

  function toCanvas(lat, lng) {
    const mx = (lng - minLng) * METERS_PER_DEG_LAT * Math.cos(((minLat+maxLat)/2) * Math.PI/180);
    const my = (maxLat - lat) * METERS_PER_DEG_LAT;
    const cx = W/2 + (mx - lngM/2) * scale;
    const cy = (H - 120)/2 + (my - latM/2) * scale + 40;
    return [cx, cy];
  }

  /* Draw path */
  ctx.beginPath();
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap  = 'round';
  const [sx, sy] = toCanvas(path[0].lat, path[0].lng);
  ctx.moveTo(sx, sy);
  for (let i = 1; i < path.length; i++) {
    const [px, py] = toCanvas(path[i].lat, path[i].lng);
    ctx.lineTo(px, py);
  }
  ctx.stroke();

  /* Start dot */
  const [fx, fy] = toCanvas(path[0].lat, path[0].lng);
  ctx.beginPath(); ctx.arc(fx, fy, 7, 0, Math.PI*2);
  ctx.fillStyle = '#00ccff'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('S', fx, fy + 3.5);

  /* Current position dot */
  const [lx, ly] = toCanvas(path[path.length-1].lat, path[path.length-1].lng);
  ctx.beginPath(); ctx.arc(lx, ly, 9, 0, Math.PI*2);
  ctx.fillStyle = '#00ff88';
  ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 16;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
}

/* ── Controls ───────────────────────────────────────────────────────────────── */
startBtn.addEventListener('click', () => {
  if (!tracking) {
    tracking = true;
    startBtn.textContent = '⏹ Stop';
    clearBtn.disabled = false;
    statusText.textContent = 'Acquiring GPS…';
    if (!navigator.geolocation) {
      statusText.textContent = 'Geolocation not supported';
      return;
    }
    watchId = navigator.geolocation.watchPosition(onGPS, onGPSError, {
      enableHighAccuracy: true, maximumAge: 0
    });
  } else {
    tracking = false;
    startBtn.textContent = '▶ Start';
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    statusText.textContent = `Stopped. ${path.length} pts, ${fmtDist(totalDist)}`;
    accBadge.style.display = 'none';
  }
});

clearBtn.addEventListener('click', () => {
  path = []; totalDist = 0; lastPt = null;
  hudDist.textContent = '0 m'; hudPts.textContent = '0';
  hudLat.textContent = '—'; hudLng.textContent = '—';
  accBadge.style.display = 'none';
  clearBtn.disabled = true;
  statusText.textContent = 'Cleared. Tap Start to begin.';
  drawMap();
});

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
